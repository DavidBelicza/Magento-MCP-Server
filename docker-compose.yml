name: magentic

x-magentic-analyzed-source-volumes: &magentic_analyzed_source_volumes
  - ${MAGENTIC_ANALYZED_SOURCE_HOST_PATH:-./www/path/to/magento/source-code}:${MAGENTIC_ANALYZED_SOURCE_CONTAINER_PATH:-/mnt/analyzed-source}:ro

services:
  magentic_frontend:
    image: magentic_frontend:latest
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    depends_on:
      magentic_backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"

  magentic_backend:
    image: magentic_backend:latest
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    command: ["npm", "run", "start:backend"]
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: "${REDIS_URL:-redis://magentic_redis:6379}"
      POSTGRES_URL: "${POSTGRES_URL:-postgres://magentic:dev-password@magentic_postgres:5432/magentic}"
      NEO4J_URI: "${NEO4J_URI:-bolt://magentic_graphdb:7687}"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-dev-password}"
      MAGENTIC_ANALYZED_SOURCE_PATH: "${MAGENTIC_ANALYZED_SOURCE_CONTAINER_PATH:-/mnt/analyzed-source}"
    volumes: *magentic_analyzed_source_volumes
    expose:
      - "3000"
    depends_on:
      magentic_redis:
        condition: service_healthy
      magentic_postgres:
        condition: service_healthy
      magentic_graphdb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  magentic_worker:
    image: magentic_backend:latest
    command: ["npm", "run", "start:worker"]
    environment:
      NODE_ENV: production
      REDIS_URL: "${REDIS_URL:-redis://magentic_redis:6379}"
      POSTGRES_URL: "${POSTGRES_URL:-postgres://magentic:dev-password@magentic_postgres:5432/magentic}"
      NEO4J_URI: "${NEO4J_URI:-bolt://magentic_graphdb:7687}"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-dev-password}"
      MAGENTIC_ANALYZED_SOURCE_PATH: "${MAGENTIC_ANALYZED_SOURCE_CONTAINER_PATH:-/mnt/analyzed-source}"
    volumes: *magentic_analyzed_source_volumes
    depends_on:
      magentic_redis:
        condition: service_healthy
      magentic_postgres:
        condition: service_healthy
      magentic_graphdb:
        condition: service_healthy

  magentic_analyzer_php:
    image: magentic_analyzer_php:latest
    build:
      context: .
      dockerfile: services/analyzer-php/Dockerfile
    environment:
      MAGENTIC_ANALYZED_SOURCE_PATH: "${MAGENTIC_ANALYZED_SOURCE_CONTAINER_PATH:-/mnt/analyzed-source}"
    volumes: *magentic_analyzed_source_volumes
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "php -r \"require '/app/vendor/autoload.php'; exit(class_exists('PhpParser\\\\ParserFactory') ? 0 : 1);\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  magentic_redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - magentic_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  magentic_postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-magentic}"
      POSTGRES_USER: "${POSTGRES_USER:-magentic}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dev-password}"
    volumes:
      - magentic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-magentic}\" -d \"$${POSTGRES_DB:-magentic}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  magentic_graphdb:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-dev-password}"
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - magentic_graphdb_data:/data
      - magentic_graphdb_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "auth=\"$${NEO4J_AUTH:-neo4j/dev-password}\"; user=\"$${auth%%/*}\"; pass=\"$${auth#*/}\"; cypher-shell -u \"$$user\" -p \"$$pass\" 'RETURN 1' || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

volumes:
  magentic_redis_data:
  magentic_postgres_data:
  magentic_graphdb_data:
  magentic_graphdb_logs:
