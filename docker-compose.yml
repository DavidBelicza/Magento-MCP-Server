name: magentic

x-magentic-analyzed-source-volumes: &magentic_analyzed_source_volumes
  - ${MAGENTIC_ANALYZED_SOURCE_HOST_PATH:-./www/path/to/magento/source-code}:/mnt/analyzed-source:ro

services:
  magentic_frontend:
    image: ghcr.io/davidbelicza/magentic_frontend:latest
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    environment:
      MAGENTIC_API_TOKEN: "${MAGENTIC_API_TOKEN:-example-token}"
    depends_on:
      magentic_backend:
        condition: service_healthy
      magentic_mcp:
        condition: service_healthy
    ports:
      - "${FRONTEND_HTTP_PORT:-8080}:80"

  magentic_backend:
    image: ghcr.io/davidbelicza/magentic_backend:latest
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    command: ["npm", "run", "start:backend"]
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_URL: "redis://magentic_redis:6379"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-magentic}:${POSTGRES_PASSWORD:-dev-password}@magentic_postgres:5432/${POSTGRES_DB:-magentic}"
      NEO4J_URI: "bolt://magentic_graphdb:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-dev-password}"
      MAGENTIC_ANALYZED_SOURCE_PATH: "/mnt/analyzed-source"
      MAGENTIC_ANALYZED_SOURCE_HOST_PATH: "${MAGENTIC_ANALYZED_SOURCE_HOST_PATH:-./www/path/to/magento/source-code}"
      MAGENTIC_CONFIG_PATH: "/app/data/config.json"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
    volumes:
      - ${MAGENTIC_ANALYZED_SOURCE_HOST_PATH:-./www/path/to/magento/source-code}:/mnt/analyzed-source:ro
      - ${MAGENTIC_CONFIG_HOST_PATH:-./data}:/app/data
    expose:
      - "3000"
    depends_on:
      magentic_redis:
        condition: service_healthy
      magentic_postgres:
        condition: service_healthy
      magentic_graphdb:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  magentic_worker:
    image: ghcr.io/davidbelicza/magentic_backend:latest
    command: ["npm", "run", "start:worker"]
    environment:
      NODE_ENV: production
      REDIS_URL: "redis://magentic_redis:6379"
      POSTGRES_URL: "postgres://${POSTGRES_USER:-magentic}:${POSTGRES_PASSWORD:-dev-password}@magentic_postgres:5432/${POSTGRES_DB:-magentic}"
      NEO4J_URI: "bolt://magentic_graphdb:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:-dev-password}"
      GRAPH_BATCH_SIZE: "${GRAPH_BATCH_SIZE:-5000}"
      MAGENTIC_ANALYZED_SOURCE_PATH: "/mnt/analyzed-source"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
    volumes: *magentic_analyzed_source_volumes
    depends_on:
      magentic_redis:
        condition: service_healthy
      magentic_postgres:
        condition: service_healthy
      magentic_graphdb:
        condition: service_healthy

  magentic_watcher:
    image: ghcr.io/davidbelicza/magentic_watcher:latest
    build:
      context: .
      dockerfile: services/watcher/Dockerfile
    command: ["npm", "run", "start"]
    environment:
      NODE_ENV: production
      MAGENTIC_ANALYZED_SOURCE_PATH: "/mnt/analyzed-source"
      MAGENTIC_CONFIG_PATH: "/app/data/config.json"
      MAGENTIC_BACKEND_URL: "${MAGENTIC_BACKEND_URL:-http://magentic_backend:3000}"
      MAGENTIC_WATCH_POLLING: "${MAGENTIC_WATCH_POLLING:-false}"
    volumes:
      - ${MAGENTIC_ANALYZED_SOURCE_HOST_PATH:-./www/path/to/magento/source-code}:/mnt/analyzed-source:ro
      - ${MAGENTIC_CONFIG_HOST_PATH:-./data}:/app/data:ro

  magentic_mcp:
    image: ghcr.io/davidbelicza/magentic_mcp:latest
    build:
      context: .
      dockerfile: services/mcp/Dockerfile
    command: ["npm", "run", "start"]
    environment:
      NODE_ENV: production
      MCP_PORT: "3000"
      MAGENTIC_BACKEND_URL: "${MAGENTIC_BACKEND_URL:-http://magentic_backend:3000}"
      MCP_PUBLIC_BASE_URL: "${MCP_PUBLIC_BASE_URL:-http://localhost:${FRONTEND_HTTP_PORT:-8080}}"
      MCP_ALLOWED_ORIGINS: "${MCP_ALLOWED_ORIGINS:-http://localhost:${FRONTEND_HTTP_PORT:-8080},http://127.0.0.1:${FRONTEND_HTTP_PORT:-8080}}"
    expose:
      - "3000"
    depends_on:
      magentic_backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:' + (process.env.MCP_PORT || 3000) + '/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  magentic_analyzer_php:
    image: ghcr.io/davidbelicza/magentic_analyzer_php:latest
    build:
      context: .
      dockerfile: services/analyzer-php/Dockerfile
    environment:
      MAGENTIC_ANALYZED_SOURCE_PATH: "/mnt/analyzed-source"
      ENABLE_TELEMETRY: "${ENABLE_TELEMETRY:-false}"
    volumes: *magentic_analyzed_source_volumes
    expose:
      - "80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:80/health || exit 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  magentic_redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - magentic_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  magentic_postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-magentic}"
      POSTGRES_USER: "${POSTGRES_USER:-magentic}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dev-password}"
    volumes:
      - magentic_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER:-magentic}\" -d \"$${POSTGRES_DB:-magentic}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  magentic_graphdb:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-dev-password}"
      NEO4J_server_memory_heap_initial__size: 2g
      NEO4J_server_memory_heap_max__size: 2g
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - magentic_graphdb_data:/data
      - magentic_graphdb_logs:/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "auth=\"$${NEO4J_AUTH:-neo4j/dev-password}\"; user=\"$${auth%%/*}\"; pass=\"$${auth#*/}\"; cypher-shell -u \"$$user\" -p \"$$pass\" 'RETURN 1' || exit 1"
        ]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s

  magentic_loki:
    image: grafana/loki:3.0.0
    profiles: ["telemetry"]
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  magentic_promtail:
    image: grafana/promtail:3.0.0
    profiles: ["telemetry"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./services/promtail/promtail-config.yaml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      magentic_loki:
        condition: service_healthy

  magentic_grafana:
    image: grafana/grafana:latest
    profiles: ["telemetry"]
    ports:
      - "${GRAFANA_HTTP_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on:
      magentic_loki:
        condition: service_healthy

volumes:
  magentic_redis_data:
  magentic_postgres_data:
  magentic_graphdb_data:
  magentic_graphdb_logs:
